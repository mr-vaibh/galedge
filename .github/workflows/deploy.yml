name: Deploy to Linode

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: deploy
          key: ${{ secrets.LINODE_SSH_KEY }}
          script: |
            set -e

            cd /opt/galedge

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # ── Backend ──
            cd /opt/galedge/backend
            source /opt/galedge/.venv/bin/activate
            pip install -r requirements.txt -q
            pip install -e /opt/galedge/packages/galedge-core -q
            pip install -e /opt/galedge/packages/galedge-ml -q

            # Update systemd to use new app.main:app entry point
            sudo sed -i 's|main:app|app.main:app|g' /etc/systemd/system/galedge-api.service 2>/dev/null || true
            sudo systemctl daemon-reload
            sudo systemctl restart galedge-api

            # ── Frontend ──
            cd /opt/galedge/frontend
            npm install --prefer-offline --no-audit --no-fund
            NODE_OPTIONS="--max-old-space-size=512" npm run build
            sudo systemctl restart galedge-frontend

            echo "✅ Deployed successfully"
