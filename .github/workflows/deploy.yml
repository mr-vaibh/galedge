name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://galedge.byvaibhav.com
        run: |
          npm ci --prefer-offline --no-audit --no-fund
          npm run build

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 165.232.179.90 >> ~/.ssh/known_hosts

      - name: Deploy backend
        run: |
          rsync -avz --delete \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='galedge_alpha.db' \
            --exclude='galedge_prices.db' \
            --exclude='uploads/' \
            backend/app/ \
            root@165.232.179.90:/opt/galedge/backend/app/

          rsync -avz backend/main.py root@165.232.179.90:/opt/galedge/backend/main.py
          rsync -avz scripts/ root@165.232.179.90:/opt/galedge/scripts/

      - name: Deploy frontend build
        run: |
          rsync -avz --delete \
            frontend/.next/ \
            root@165.232.179.90:/opt/galedge/frontend/.next/

          rsync -avz frontend/public/ root@165.232.179.90:/opt/galedge/frontend/public/

      - name: Restart services
        run: |
          ssh root@165.232.179.90 "
            systemctl restart galedge-api
            sleep 3
            systemctl restart galedge-frontend
            sleep 3
            systemctl is-active galedge-api galedge-frontend
          "

      - name: Verify deployment
        run: |
          sleep 5
          STATUS=$(curl -sm10 -o /dev/null -w "%{http_code}" https://galedge.byvaibhav.com/api/health)
          echo "API health: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ API health check failed"
            exit 1
          fi
          echo "✅ Deployed successfully"
