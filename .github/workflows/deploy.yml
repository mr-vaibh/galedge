name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            # Ensure swap exists so the Next.js build doesn't get OOM-killed (exit 137)
            if ! sudo swapon --show | grep -q '/swapfile'; then
              sudo fallocate -l 2G /swapfile
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
              echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
            fi

            cd /opt/galedge

            # Pull latest code
            git fetch --depth=1 --no-tags origin main
            git reset --hard origin/main
            git clean -fd

            # ── Backend ──
            cd /opt/galedge/backend
            source /opt/galedge/.venv/bin/activate
            export MAX_JOBS=1
            pip install --prefer-binary --no-build-isolation --no-cache-dir -r requirements.txt -q
            pip install --no-build-isolation --no-cache-dir -e /opt/galedge/packages/galedge-core -q
            pip install --no-build-isolation --no-cache-dir -e /opt/galedge/packages/galedge-ml -q

            sudo systemctl daemon-reload
            sudo systemctl restart galedge-api

            # ── Frontend ──
            cd /opt/galedge/frontend
            npm install --prefer-offline --no-audit --no-fund
            NODE_OPTIONS="--max-old-space-size=512" npm run build
            sudo systemctl restart galedge-frontend

            echo "✅ Deployed successfully"