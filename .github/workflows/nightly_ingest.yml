name: Nightly Price Ingestion

on:
  schedule:
    - cron: '30 18 * * 1-5'  # 18:30 UTC = midnight IST, weekdays only
  workflow_dispatch:           # allow manual trigger from GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Fetch latest prices
        run: python scripts/fetch_prices.py

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 165.232.179.90 >> ~/.ssh/known_hosts

      - name: Upload CSV to server
        run: scp -i ~/.ssh/id_ed25519 /tmp/prices_export.csv root@165.232.179.90:/tmp/prices_export.csv

      - name: Import into DB
        run: |
          ssh -i ~/.ssh/id_ed25519 root@165.232.179.90 \
            "cd /opt/galedge/backend && /opt/galedge/.venv/bin/python /tmp/import_prices.py > /tmp/import.log 2>&1 && tail -3 /tmp/import.log"
