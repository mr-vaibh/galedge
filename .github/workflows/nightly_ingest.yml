name: Nightly Data Ingestion

on:
  schedule:
    - cron: '30 18 * * 1-5'  # 18:30 UTC = midnight IST, weekdays only
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Fetch latest prices
        run: python scripts/fetch_prices.py

      - name: Fetch fundamentals
        run: python scripts/fetch_fundamentals.py

      - name: Fetch news and recommendations
        run: python scripts/fetch_intel.py

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 165.232.179.90 >> ~/.ssh/known_hosts

      - name: Upload data and import scripts to server
        run: |
          scp -i ~/.ssh/id_ed25519 /tmp/prices_export.csv root@165.232.179.90:/tmp/prices_export.csv
          scp -i ~/.ssh/id_ed25519 /tmp/fundamentals_export.csv root@165.232.179.90:/tmp/fundamentals_export.csv
          scp -i ~/.ssh/id_ed25519 /tmp/intel_export.json root@165.232.179.90:/tmp/intel_export.json
          scp -i ~/.ssh/id_ed25519 scripts/import_prices.py root@165.232.179.90:/tmp/import_prices.py
          scp -i ~/.ssh/id_ed25519 scripts/import_fundamentals.py root@165.232.179.90:/tmp/import_fundamentals.py
          scp -i ~/.ssh/id_ed25519 scripts/import_intel.py root@165.232.179.90:/tmp/import_intel.py

      - name: Import prices into DB
        run: |
          ssh -i ~/.ssh/id_ed25519 root@165.232.179.90 \
            "/opt/galedge/.venv/bin/python /tmp/import_prices.py 2>&1 | tail -5"

      - name: Import fundamentals into DB
        run: |
          ssh -i ~/.ssh/id_ed25519 root@165.232.179.90 \
            "/opt/galedge/.venv/bin/python /tmp/import_fundamentals.py 2>&1 | tail -5"

      - name: Import news and recommendations into DB
        run: |
          ssh -i ~/.ssh/id_ed25519 root@165.232.179.90 \
            "/opt/galedge/.venv/bin/python /tmp/import_intel.py 2>&1 | tail -5"

      - name: Verify
        run: |
          curl -sm10 https://galedge.byvaibhav.com/api/data/stats
